openapi: 3.1.0
info:
  title: Backend Doria API 1.2
  version: 2.0.0
  description: |
    Especificação OpenAPI 3.1 atualizada a partir do backend Fastify.

    Observações:
    - Rotas protegidas aceitam autenticação por cookie `token` ou por header `Authorization: Bearer <jwt>`.
    - O token retornado em `POST /login` é o JWT de sessão local do backend.
    - `POST /auth/session` e `POST /auth/onboard` criam sessão local a partir de um `access_token` do Supabase.
    - Os recursos associados ao usuário autenticado resolvem o `id_usuario` a partir do `auth_id` presente na sessão.
    - As tabelas novas estão no schema `doria`.
    - As rotas CRUD usam validação interna e bloqueiam alteração de campos protegidos como IDs e campos de criação.

servers:
  - url: https://api.falecomadoria.com.br
    description: Produção
  - url: http://localhost:3433
    description: Local

tags:
  - name: Health
  - name: Auth
  - name: Chat
  - name: Usuário
  - name: Consultas
  - name: Agenda Doria
  - name: Minha Jornada
  - name: Registro de Dor
  - name: Especialistas
  - name: Especialista SBED
  - name: Clínicas
  - name: Convênios
  - name: Endereços
  - name: Horário de Atendimento
  - name: Medicações
  - name: Controle de Medicações

paths:
  /:
    get:
      tags:
        - Health
      summary: Verifica se existe sessão ativa via cookie
      description: |
        Verifica apenas o cookie `token`.
        Não utiliza header `Authorization`.
      operationId: healthCheck
      responses:
        "200":
          description: Status da API e presença de sessão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/signup:
    post:
      tags:
        - Auth
      summary: Cadastra usuário com e-mail e senha
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSignupRequest"
      responses:
        "200":
          description: Cadastro realizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSignupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Usuário já existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /login:
    post:
      tags:
        - Auth
      summary: Faz login com e-mail e senha
      description: |
        Autentica no Supabase, cria o cookie `token` e retorna o JWT de sessão local no campo `token`.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          headers:
            Set-Cookie:
              description: Cookie de sessão `token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/session:
    post:
      tags:
        - Auth
      summary: Cria sessão local a partir de access token do Supabase
      operationId: authSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessTokenRequest"
      responses:
        "200":
          description: Sessão criada com sucesso
          headers:
            Set-Cookie:
              description: Cookie de sessão `token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/onboard:
    post:
      tags:
        - Auth
      summary: Alias de onboarding a partir de access token do Supabase
      description: Mantém compatibilidade com fluxo pós-OAuth ou confirmação de conta.
      operationId: authOnboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessTokenRequest"
      responses:
        "200":
          description: Sessão criada com sucesso
          headers:
            Set-Cookie:
              description: Cookie de sessão `token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Solicita recuperação de senha
      operationId: authForgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Solicitação enviada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/update-password:
    post:
      tags:
        - Auth
      summary: Atualiza senha usando access token válido do Supabase
      operationId: authUpdatePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordRequest"
      responses:
        "200":
          description: Senha atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags:
        - Auth
      summary: Retorna os dados da sessão autenticada
      operationId: authMe
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Sessão autenticada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "440":
          $ref: "#/components/responses/IdleTimeout"

  /logout:
    post:
      tags:
        - Auth
      summary: Encerra sessão local
      operationId: logout
      responses:
        "200":
          description: Logout realizado
          headers:
            Set-Cookie:
              description: Cookie `token` limpo
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /consent:
    post:
      tags:
        - Chat
      summary: Cria sessão anônima após aceite de consentimento
      operationId: consent
      responses:
        "200":
          description: Consentimento aceito
          headers:
            Set-Cookie:
              description: Cookie de sessão `token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentResponse"

  /send-message-n8n:
    post:
      tags:
        - Chat
      summary: Envia mensagem para webhook do n8n
      operationId: sendMessageN8n
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Resposta retornada pelo n8n
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "440":
          $ref: "#/components/responses/IdleTimeout"
        "502":
          description: Falha no webhook do n8n
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usuario:
    post:
      tags:
        - Usuário
      summary: Cria ou atualiza o perfil do usuário autenticado
