components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: UUID do recurso.
      schema:
        type: string
        format: uuid

    AuthIdParam:
      name: auth_id
      in: path
      required: true
      description: UUID do usuário no Supabase Auth.
      schema:
        type: string
        format: uuid

    IdUsuarioParam:
      name: id_usuario
      in: path
      required: true
      description: UUID do usuário.
      schema:
        type: string
        format: uuid

    IdEspecialistaParam:
      name: id_especialista
      in: path
      required: true
      description: UUID do especialista.
      schema:
        type: string
        format: uuid

    IdClinicaParam:
      name: id_clinica
      in: path
      required: true
      description: UUID da clínica.
      schema:
        type: string
        format: uuid

    IdMedicacoesParam:
      name: id_medicacoes
      in: path
      required: true
      description: UUID da medicação.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Sem permissão para acessar o recurso
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    IdleTimeout:
      description: Sessão expirada por inatividade
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        Error:
          type: string
      required:
        - Error
      additionalProperties: true

    OkStatusResponse:
      type: object
      properties:
        Status:
          type: string
          example: ok
      required:
        - Status

    HealthResponse:
      type: object
      properties:
        Status:
          type: string
          example: Success
        hasSession:
          type: boolean
      required:
        - Status
        - hasSession

    AuthSignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        nome:
          type: string
        tipo:
          type: string
          default: paciente
        cpf:
          type: string
      required:
        - email
        - password
      additionalProperties: true

    AuthSignupResponse:
      type: object
      properties:
        Status:
          type: string
          example: created
        auth_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        needs_email_confirm:
          type: boolean
      required:
        - Status
        - auth_id
        - email
        - needs_email_confirm

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        Status:
          type: string
          example: success
        token:
          type: string
        user:
          type: object
          properties:
            nome:
              type:
                - string
                - "null"
            email:
              type: string
              format: email
            tipo:
              type: string
          required:
            - email
            - tipo
      required:
        - Status
        - token
        - user

    AccessTokenRequest:
      type: object
      properties:
        access_token:
          type: string
      required:
        - access_token

    AuthSessionResponse:
      type: object
      properties:
        Status:
          type: string
          example: success
        user:
          $ref: "#/components/schemas/AuthUsuarioProfile"
      required:
        - Status
        - user

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    UpdatePasswordRequest:
      type: object
      properties:
        access_token:
          type: string
        newPassword:
          type: string
          minLength: 8
      required:
        - access_token
        - newPassword

    UpdatePasswordResponse:
      type: object
      properties:
        Status:
          type: string
          example: ok
        updated:
          type: boolean
          example: true
      required:
        - Status
        - updated

    AuthMeResponse:
      type: object
      properties:
        Status:
          type: string
          example: ok
        user:
          $ref: "#/components/schemas/JwtSessionPayload"
      required:
        - Status
        - user

    LogoutResponse:
      type: object
      properties:
        Status:
          type: string
          example: Logged out
      required:
        - Status

    ConsentResponse:
      type: object
      properties:
        Status:
          type: string
          example: Consent accepted
        created:
          type: boolean
          example: true
      required:
        - Status
        - created

    SendMessageRequest:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    JwtSessionPayload:
      type: object
      properties:
        sub:
          type: string
          format: uuid
        last:
          type: integer
          format: int64
        anon:
          type: boolean
        doctorId:
          type: string
        nome:
          type: string
        email:
          type: string
          format: email
        tipo:
          type: string
        cpf:
          type: string
      required:
        - sub
        - last
        - anon
      additionalProperties: true

    AuthUsuarioProfile:
      type: object
      properties:
        id_usuario:
