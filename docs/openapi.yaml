      summary: Atualiza consulta por ID
      operationId: updateConsulta
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultaUpdateRequest"
      responses:
        "200":
          description: Consulta atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultaMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "440":
          $ref: "#/components/responses/IdleTimeout"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
